<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Задачи</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f9fafb;
      --bg-card: #ffffff;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --border-color: #e5e7eb;
      --border-color-strong: #d1d5db;
      --accent-color: #4f46e5;
      --accent-text: #818cf8;
      --success-color: #22c55e;
      --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    [data-theme="dark"] {
      --bg-primary: #020617;
      --bg-secondary: #0f172a;
      --bg-card: #020617;
      --text-primary: #e5e7eb;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border-color: rgba(148, 163, 184, 0.4);
      --border-color-strong: rgba(148, 163, 184, 0.7);
      --accent-color: #4f46e5;
      --accent-text: #818cf8;
      --success-color: #22c55e;
      --card-shadow: 0 14px 30px rgba(0, 0, 0, 0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 10px 10px 18px 10px;
      touch-action: manipulation;
      transition: background 0.3s, color 0.3s;
    }
    .app { max-width: 560px; margin: 0 auto; }
    .app-header { 
      margin-bottom: 10px; 
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border-color);
    }
    .app-title { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .app-subtitle { font-size: 13px; opacity: 0.7; }
    
    /* Theme Toggle */
    .theme-toggle {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-primary);
      transition: all 0.3s;
    }
    .theme-toggle:hover {
      background: var(--bg-secondary);
    }

    .add-card {
      margin-top: 10px;
      padding: 14px 14px 12px 14px;
      border-radius: 16px;
      background: var(--bg-card);
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border-color);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .add-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #4f46e5, #818cf8, #4f46e5);
      background-size: 200% 100%;
      animation: gradientMove 3s ease infinite;
    }
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .add-label { font-size: 14px; font-weight: 600; margin-bottom: 8px; opacity: 0.9; }
    .add-textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border-color-strong);
      background: var(--bg-card);
      color: var(--text-primary);
      padding: 12px 12px;
      font-size: 16px;
      resize: none;
      outline: none;
      min-height: 82px;
      transition: all 0.3s;
    }
    .add-textarea::placeholder { color: var(--text-muted); }
    .add-date-row { margin-top: 10px; }
    .date-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .date-quick-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .date-btn {
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-color-strong);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      min-height: 34px;
      -webkit-tap-highlight-color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.3s;
    }
    .date-btn.primary {
      border-color: var(--accent-color);
      background: var(--accent-color);
      color: #fff;
    }
    .date-btn.primary.active {
      background: #7c3aed;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }
    .date-btn.active {
      border-color: var(--accent-color);
      background: rgba(79, 70, 229, 0.12);
      color: var(--accent-text);
    }
    .date-display {
      margin-top: 6px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      min-height: 20px;
      transition: all 0.3s;
    }
    .date-display span { color: var(--accent-text); }
    .date-input { position: absolute; opacity: 0; pointer-events: none; }
    .add-footer { margin-top: 10px; display: flex; justify-content: flex-end; }
    .add-btn {
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: var(--success-color);
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .add-btn:disabled { opacity: 0.4; cursor: default; }
    .tabs {
      margin-top: 14px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      background: var(--bg-secondary);
      padding: 6px;
      border-radius: 16px;
    }
    .tab-btn {
      flex: 1;
      min-width: 0;
      padding: 10px 8px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.3s;
    }
    .tab-btn span.count {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-color);
      color: #fff;
      font-weight: 600;
    }
    .tab-btn.active {
      border-color: var(--accent-color);
      background: var(--accent-color);
      color: #fff;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }
    .tab-btn.active span.count {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    .task-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 8px;
    }
    .empty-text {
      font-size: 13px;
      opacity: 0.6;
      text-align: center;
      padding: 18px 10px;
    }
    .task-card {
      border-radius: 14px;
      padding: 12px 12px 10px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .task-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, #4f46e5, #818cf8);
      border-radius: 14px 0 0 14px;
    }
    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--card-shadow);
    }
    .task-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 6px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .task-planned {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--bg-card);
      border: 1px solid var(--border-color-strong);
      transition: all 0.3s;
    }
    .planned-today { border-color: #f97316; color: #fed7aa; }
    .planned-overdue { border-color: #dc2626; color: #fecaca; }
    .planned-future { border-color: #38bdf8; color: #bae6fd; }
    [data-theme="light"] .planned-today { border-color: #ea580c; color: #c2410c; }
    [data-theme="light"] .planned-overdue { border-color: #dc2626; color: #dc2626; }
    [data-theme="light"] .planned-future { border-color: #0284c7; color: #0284c7; }
    .task-meta { font-size: 11px; opacity: 0.65; transition: all 0.3s; }
    .task-meta span + span::before { content: "•"; margin: 0 4px; opacity: 0.5; }
    .task-actions { margin-top: 8px; display: flex; gap: 6px; }
    .task-btn {
      flex: 1;
      padding: 7px 8px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.3s;
    }
    .task-btn-main { background: var(--accent-color); color: #fff; }
    .task-btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-color-strong);
    }
    .task-btn:disabled { opacity: 0.4; cursor: default; }

    /* Custom Date Picker Modal */
    .date-picker-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
    }
    .date-picker-modal.active {
      display: block;
    }
    .date-picker-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
    }
    .date-picker-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .date-picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .date-picker-nav {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-primary);
    }
    #currentMonthYear {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .date-picker-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      margin-bottom: 10px;
    }
    .date-picker-weekdays span {
      font-size: 12px;
      color: var(--text-muted);
      padding: 5px;
    }
    .date-picker-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      max-height: 300px;
      overflow-y: auto;
    }
    .date-picker-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-primary);
      transition: all 0.2s;
    }
    .date-picker-day:hover {
      background: var(--bg-secondary);
    }
    .date-picker-day.selected {
      background: var(--accent-color);
      color: #fff;
    }
    .date-picker-day.today {
      border: 2px solid var(--accent-color);
    }
    .date-picker-day.other-month {
      opacity: 0.3;
    }
    .date-picker-day.disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }
    .date-picker-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .date-picker-clear, .date-picker-close {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .date-picker-clear {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
    }
    .date-picker-close {
      background: var(--accent-color);
      border: none;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div>
        <div class="app-title">Задачи</div>
        <div class="app-subtitle">Сначала записать, потом разбирать</div>
      </div>
      <button class="theme-toggle" id="themeToggle" title="Сменить тему">
        <span id="themeIcon">🌙</span>
      </button>
    </header>

    <section class="add-card">
      <div class="add-label">Новая задача</div>
      <textarea id="newTaskInput" class="add-textarea" rows="3" placeholder="Напишите, что нужно сделать..."></textarea>

      <div class="add-date-row">
        <div class="date-label">Плановая дата (необязательно)</div>
        <div class="date-quick-row">
          <button class="date-btn" data-days="0" id="btnToday">Сегодня</button>
          <button class="date-btn" data-days="1" id="btnTomorrow">Завтра</button>
          <button class="date-btn" data-adjust="-1" id="btnMinusDay">−1 день</button>
          <button class="date-btn" data-adjust="1" id="btnPlusDay">+1 день</button>
          <button class="date-btn primary" id="btnCalendar">📅</button>
          <input type="date" id="plannedDateInput" class="date-input" />
        </div>
        <div class="date-display" id="dateDisplay"></div>
      </div>

      <!-- Custom Date Picker Modal -->
      <div class="date-picker-modal" id="datePickerModal">
        <div class="date-picker-overlay" id="datePickerOverlay"></div>
        <div class="date-picker-content">
          <div class="date-picker-header">
            <button class="date-picker-nav" id="prevMonth">&lt;</button>
            <span id="currentMonthYear"></span>
            <button class="date-picker-nav" id="nextMonth">&gt;</button>
          </div>
          <div class="date-picker-weekdays">
            <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
          </div>
          <div class="date-picker-days" id="datePickerDays"></div>
          <div class="date-picker-actions">
            <button class="date-picker-clear" id="clearDate">Очистить</button>
            <button class="date-picker-close" id="closeDatePicker">Закрыть</button>
          </div>
        </div>
      </div>

      <div class="add-footer">
        <button class="add-btn" id="addTaskBtn" disabled>➕ Добавить</button>
      </div>
    </section>

    <section class="tabs">
      <button class="tab-btn active" data-status="todo" id="tabTodo">
        📝 К выполнению <span class="count" id="countTodo">0</span>
      </button>
      <button class="tab-btn" data-status="inprogress" id="tabInProgress">
        🔄 В работе <span class="count" id="countInProgress">0</span>
      </button>
      <button class="tab-btn" data-status="done" id="tabDone">
        ✅ Готово <span class="count" id="countDone">0</span>
      </button>
    </section>

    <section class="task-list" id="taskList">
      <div class="empty-text">Задач пока нет. Напишите первую сверху.</div>
    </section>
  </div>

  <script>
    // Theme Management
    const THEME_KEY = 'app_theme';
    
    function getStoredTheme() {
      return localStorage.getItem(THEME_KEY) || 'light';
    }
    
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem(THEME_KEY, theme);
      document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
    }
    
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      setTheme(newTheme);
    }
    
    // Initialize theme on load
    setTheme(getStoredTheme());

    // Theme toggle event
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    // API URL
    const API_URL = 'https://script.google.com/macros/s/AKfycbwOmfbiY6qcoZtJJFyazXATEQKiVakQoFvRtVBwJbtGIFQUlhxFSiXlL89mI2_cxEg0/exec';

    let tg = null;
    let tasks = [];
    let activeStatus = 'todo';

    if (window.Telegram && window.Telegram.WebApp) {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
    }

    function haptic(type) {
      if (!tg || !tg.HapticFeedback) return;
      if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
      else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
      else tg.HapticFeedback.impactOccurred('light');
    }

    function getTodayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function getDateOffsetStr(baseStr, offsetDays) {
      let d;
      if (baseStr) {
        const [y, m, day] = baseStr.split('-').map(Number);
        d = new Date(y, m - 1, day, 12, 0, 0);
      } else {
        d = new Date();
      }
      d.setDate(d.getDate() + offsetDays);
      const y2 = d.getFullYear();
      const m2 = String(d.getMonth() + 1).padStart(2, '0');
      const d2 = String(d.getDate()).padStart(2, '0');
      return `${y2}-${m2}-${d2}`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return '';
      const d = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    }

    function formatDateWithDay(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return '';
      const d = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'long' });
    }

    function setSelectedDateText(value) {
      const el = document.getElementById('dateDisplay');
      if (!el) return;
      if (!value) {
        el.textContent = '';
        return;
      }
      el.innerHTML = 'Запланировано на <span>' + formatDateWithDay(value) + '</span>';
    }

    // JSONP запрос для обхода CORS с GitHub Pages
    function apiJsonp(action, params = {}) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonp_callback_' + Date.now();
        // Кодируем параметры вручную для избежания проблем
        let urlParams = `mode=jsonp&action=${encodeURIComponent(action)}&callback=${callbackName}`;
        for (const key in params) {
          if (params[key]) {
            urlParams += `&${encodeURIComponent(key)}=${encodeURIComponent(params[key])}`;
          }
        }
        const url = `${API_URL}?${urlParams}`;
        console.log('JSONP URL:', url);
        
        // Создаём script тег
        const script = document.createElement('script');
        script.src = url;
        script.onerror = () => reject(new Error('JSONP request failed'));
        
        // Функция обратного вызова
        window[callbackName] = (response) => {
          console.log('JSONP response:', response);
          if (response && response.ok) {
            resolve(response.data);
          } else {
            reject(new Error(response?.error || 'API error'));
          }
          // Очищаем
          delete window[callbackName];
          document.body.removeChild(script);
        };
        
        document.body.appendChild(script);
      });
    }

    async function loadTasks() {
      console.log('Loading tasks from:', API_URL);
      try {
        // Используем JSONP для обхода CORS
        const data = await apiJsonp('getTasks');
        console.log('Tasks loaded:', data);
        tasks = data || [];
        renderAll();
      } catch (e) {
        console.error('Load tasks error:', e);
        const list = document.getElementById('taskList');
        if (list) list.innerHTML = '<div class="empty-text">Ошибка загрузки: ' + e.message + '</div>';
      }
    }

    function initAddSection() {
      const input = document.getElementById('newTaskInput');
      const btnAdd = document.getElementById('addTaskBtn');
      const btnToday = document.getElementById('btnToday');
      const btnTomorrow = document.getElementById('btnTomorrow');
      const btnMinusDay = document.getElementById('btnMinusDay');
      const btnPlusDay = document.getElementById('btnPlusDay');
      const btnCalendar = document.getElementById('btnCalendar');
      const dateInput = document.getElementById('plannedDateInput');

      input.addEventListener('input', () => {
        const hasText = input.value.trim().length > 0;
        btnAdd.disabled = !hasText;
      });

      function setActiveQuick(button) {
        [btnToday, btnTomorrow].forEach(b => {
          if (button && b === button && b.classList.contains('active')) {
            b.classList.remove('active');
          } else if (button && b === button) {
            b.classList.add('active');
          } else {
            b.classList.remove('active');
          }
        });
        // Also handle calendar button
        if (button && button !== btnCalendar) {
          btnCalendar.classList.remove('active');
        }
      }

      btnToday.addEventListener('click', () => {
        const v = getTodayStr();
        const isActive = btnToday.classList.contains('active');
        if (isActive) {
          dateInput.value = '';
          setSelectedDateText('');
          setActiveQuick(btnToday);
        } else {
          dateInput.value = v;
          setSelectedDateText(v);
          setActiveQuick(btnToday);
        }
        haptic('light');
      });

      btnTomorrow.addEventListener('click', () => {
        const v = getDateOffsetStr(getTodayStr(), 1);
        const isActive = btnTomorrow.classList.contains('active');
        if (isActive) {
          dateInput.value = '';
          setSelectedDateText('');
          setActiveQuick(btnTomorrow);
        } else {
          dateInput.value = v;
          setSelectedDateText(v);
          setActiveQuick(btnTomorrow);
        }
        haptic('light');
      });

      btnMinusDay.addEventListener('click', () => {
        const base = dateInput.value || getTodayStr();
        const v = getDateOffsetStr(base, -1);
        dateInput.value = v;
        setSelectedDateText(v);
        setActiveQuick(null);
        haptic('light');
      });

      btnPlusDay.addEventListener('click', () => {
        const base = dateInput.value || getTodayStr();
        const v = getDateOffsetStr(base, 1);
        dateInput.value = v;
        setSelectedDateText(v);
        setActiveQuick(null);
        haptic('light');
      });

      // Custom Date Picker
      let pickerYear, pickerMonth;
      const datePickerModal = document.getElementById('datePickerModal');
      const datePickerDays = document.getElementById('datePickerDays');
      const currentMonthYear = document.getElementById('currentMonthYear');
      
      function openDatePicker() {
        const currentValue = dateInput.value;
        if (currentValue) {
          const [y, m, d] = currentValue.split('-').map(Number);
          pickerYear = y;
          pickerMonth = m - 1;
        } else {
          const today = new Date();
          pickerYear = today.getFullYear();
          pickerMonth = today.getMonth();
        }
        renderDatePicker();
        datePickerModal.classList.add('active');
        btnCalendar.classList.add('active');
      }
      
      function closeDatePicker() {
        datePickerModal.classList.remove('active');
      }
      
      function renderDatePicker() {
        const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
        currentMonthYear.textContent = months[pickerMonth] + ' ' + pickerYear;
        
        const today = new Date();
        const todayStr = getTodayStr();
        const firstDay = new Date(pickerYear, pickerMonth, 1);
        const lastDay = new Date(pickerYear, pickerMonth + 1, 0);
        const startingDay = (firstDay.getDay() + 6) % 7; // Monday = 0
        
        let html = '';
        const selectedValue = dateInput.value;
        
        // Previous month days
        const prevMonthLastDay = new Date(pickerYear, pickerMonth, 0).getDate();
        for (let i = startingDay - 1; i >= 0; i--) {
          const day = prevMonthLastDay - i;
          html += '<span class="date-picker-day other-month" data-day="' + day + '" data-month="' + (pickerMonth - 1) + '" data-year="' + pickerYear + '">' + day + '</span>';
        }
        
        // Current month days
        for (let day = 1; day <= lastDay.getDate(); day++) {
          const dateStr = pickerYear + '-' + String(pickerMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
          let classes = 'date-picker-day';
          if (dateStr === todayStr) classes += ' today';
          if (dateStr === selectedValue) classes += ' selected';
          if (dateStr < todayStr) classes += ' disabled';
          html += '<span class="' + classes + '" data-day="' + day + '" data-month="' + pickerMonth + '" data-year="' + pickerYear + '">' + day + '</span>';
        }
        
        // Next month days
        const remainingDays = 42 - (startingDay + lastDay.getDate());
        for (let day = 1; day <= remainingDays; day++) {
          html += '<span class="date-picker-day other-month" data-day="' + day + '" data-month="' + (pickerMonth + 1) + '" data-year="' + pickerYear + '">' + day + '</span>';
        }
        
        datePickerDays.innerHTML = html;
        
        // Add click handlers
        datePickerDays.querySelectorAll('.date-picker-day:not(.disabled)').forEach(el => {
          el.addEventListener('click', () => {
            const day = el.dataset.day;
            const month = parseInt(el.dataset.month) + 1;
            const year = el.dataset.year;
            const dateStr = year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
            dateInput.value = dateStr;
            setSelectedDateText(dateStr);
            closeDatePicker();
            haptic('light');
          });
        });
      }
      
      document.getElementById('prevMonth').addEventListener('click', () => {
        pickerMonth--;
        if (pickerMonth < 0) {
          pickerMonth = 11;
          pickerYear--;
        }
        renderDatePicker();
      });
      
      document.getElementById('nextMonth').addEventListener('click', () => {
        pickerMonth++;
        if (pickerMonth > 11) {
          pickerMonth = 0;
          pickerYear++;
        }
        renderDatePicker();
      });
      
      document.getElementById('datePickerOverlay').addEventListener('click', closeDatePicker);
      document.getElementById('closeDatePicker').addEventListener('click', closeDatePicker);
      document.getElementById('clearDate').addEventListener('click', () => {
        dateInput.value = '';
        setSelectedDateText('');
        btnCalendar.classList.remove('active');
        setActiveQuick(null);
        closeDatePicker();
        haptic('light');
      });

      btnCalendar.addEventListener('click', () => {
        if (datePickerModal.classList.contains('active')) {
          closeDatePicker();
        } else {
          openDatePicker();
        }
      });

      dateInput.addEventListener('change', () => {
        const v = dateInput.value;
        setSelectedDateText(v);
        if (v) {
          btnCalendar.classList.add('active');
          setActiveQuick(null);
        } else {
          btnCalendar.classList.remove('active');
        }
      });

      btnAdd.addEventListener('click', async () => {
        const title = input.value.trim();
        if (!title) return;
        const planned = dateInput.value || '';
        btnAdd.disabled = true;
        haptic('success');
        try {
          const data = await apiJsonp('addTask', { title, plannedDate: planned });
          tasks = data || [];
          renderAll();
          input.value = '';
          dateInput.value = '';
          setSelectedDateText('');
          document.getElementById('countInProgress').textContent = tasks.filter(t => t.status === 'inprogress').length;
        } catch (e) {
          alert('Ошибка: ' + e.message);
          haptic('error');
        } finally {
          btnAdd.disabled = false;
        }
      });
    }

    function initTabs() {
      const tabs = document.querySelectorAll('.tab-btn');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          const status = tab.dataset.status;
          if (!status) return;
          activeStatus = status;
          document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderTaskList();
          haptic('light');
        });
      });
    }

    function updateTabCounts() {
      const todo = tasks.filter(t => t.status === 'todo').length;
      const inProgress = tasks.filter(t => t.status === 'inprogress').length;
      const done = tasks.filter(t => t.status === 'done').length;
      document.getElementById('countTodo').textContent = todo;
      document.getElementById('countInProgress').textContent = inProgress;
      document.getElementById('countDone').textContent = done;
    }

    function renderAll() {
      updateTabCounts();
      renderTaskList();
    }

    function renderTaskList() {
      const list = document.getElementById('taskList');
      if (!list) return;

      const today = getTodayStr();
      const items = tasks.filter(t => t.status === activeStatus);

      items.sort((a, b) => {
        const ap = a.plannedDate || '';
        const bp = b.plannedDate || '';
        if (ap && bp && ap !== bp) return ap.localeCompare(bp);
        const as = a.startDate || '';
        const bs = b.startDate || '';
        return (bs || '').localeCompare(as || '');
      });

      list.innerHTML = '';

      if (items.length === 0) {
        const div = document.createElement('div');
        div.className = 'empty-text';
        div.textContent = activeStatus === 'todo'
          ? 'Новых задач нет. Добавьте сверху.'
          : 'Задач в этом разделе пока нет.';
        list.appendChild(div);
        return;
      }

      items.forEach(task => {
        const card = document.createElement('div');
        card.className = 'task-card';

        const titleEl = document.createElement('div');
        titleEl.className = 'task-title';
        titleEl.textContent = task.title || '';
        card.appendChild(titleEl);

        if (task.plannedDate) {
          const pill = document.createElement('div');
          pill.className = 'task-planned';
          const planned = task.plannedDate;
          if (planned < today) pill.classList.add('planned-overdue');
          else if (planned === today) pill.classList.add('planned-today');
          else pill.classList.add('planned-future');
          pill.textContent = planned === today ? 'Сегодня' : formatDateWithDay(planned);
          card.appendChild(pill);
        }

        const meta = document.createElement('div');
        meta.className = 'task-meta';
        const metaParts = [];
        if (task.startDate) metaParts.push('с ' + formatDate(task.startDate));
        if (task.duration) metaParts.push(task.duration);
        meta.innerHTML = metaParts.map(t => '<span>' + t + '</span>').join('');
        card.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'task-actions';

        if (activeStatus === 'todo') {
          const main = document.createElement('button');
          main.className = 'task-btn task-btn-main';
          main.textContent = 'В работу';
          main.onclick = () => changeStatus(task.id, 'inprogress');
          actions.appendChild(main);
        } else if (activeStatus === 'inprogress') {
          const back = document.createElement('button');
          back.className = 'task-btn task-btn-secondary';
          back.textContent = 'Назад';
          back.onclick = () => changeStatus(task.id, 'todo');
          actions.appendChild(back);

          const main = document.createElement('button');
          main.className = 'task-btn task-btn-main';
          main.textContent = 'Готово';
          main.onclick = () => changeStatus(task.id, 'done');
          actions.appendChild(main);
        } else if (activeStatus === 'done') {
          const back = document.createElement('button');
          back.className = 'task-btn task-btn-secondary';
          back.textContent = 'Вернуть в работу';
          back.onclick = () => changeStatus(task.id, 'inprogress');
          actions.appendChild(back);
        }

        card.appendChild(actions);
        list.appendChild(card);
      });
    }

    async function changeStatus(taskId, newStatus) {
      if (!taskId || !newStatus) return;
      haptic('light');
      try {
        const data = await apiJsonp('updateStatus', { id: taskId, status: newStatus });
        tasks = data || [];
        renderAll();
      } catch (e) {
        alert('Ошибка: ' + e.message);
        haptic('error');
      }
    }

    function init() {
      initAddSection();
      initTabs();
      loadTasks();
      setSelectedDateText('');
    }

    init();
  </script>
</body>
</html>
