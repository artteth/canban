<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Задачи</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #020617;
      color: #e5e7eb;
      min-height: 100vh;
      padding: 10px 10px 18px 10px;
      touch-action: manipulation;
    }
    .app { max-width: 560px; margin: 0 auto; }
    .app-header { margin-bottom: 10px; }
    .app-title { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .app-subtitle { font-size: 13px; opacity: 0.7; }
    .add-card {
      margin-top: 10px;
      padding: 14px 14px 12px 14px;
      border-radius: 16px;
      background: #020617;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.4);
    }
    .add-label { font-size: 14px; font-weight: 600; margin-bottom: 8px; opacity: 0.9; }
    .add-textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      background: #020617;
      color: inherit;
      padding: 12px 12px;
      font-size: 16px;
      resize: none;
      outline: none;
      min-height: 82px;
    }
    .add-textarea::placeholder { color: rgba(148, 163, 184, 0.9); }
    .add-date-row { margin-top: 10px; }
    .date-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .date-quick-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .date-btn {
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      background: #020617;
      color: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      min-height: 34px;
      -webkit-tap-highlight-color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .date-btn.primary {
      border-color: #4f46e5;
      background: #4f46e5;
      color: #fff;
    }
    .date-btn.active {
      border-color: #4f46e5;
      background: rgba(79, 70, 229, 0.12);
      color: #818cf8;
    }
    .date-display {
      margin-top: 6px;
      font-size: 15px;
      font-weight: 600;
      color: #e5e7eb;
      min-height: 20px;
    }
    .date-display span { color: #a5b4fc; }
    .date-input { position: absolute; opacity: 0; pointer-events: none; }
    .add-footer { margin-top: 10px; display: flex; justify-content: flex-end; }
    .add-btn {
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: #22c55e;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .add-btn:disabled { opacity: 0.4; cursor: default; }
    .tabs {
      margin-top: 14px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .tab-btn {
      flex: 1;
      min-width: 0;
      padding: 8px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: transparent;
      color: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab-btn span.count {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.6);
    }
    .tab-btn.active {
      border-color: #4f46e5;
      background: rgba(79, 70, 229, 0.12);
      color: #818cf8;
    }
    .task-list {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 8px;
    }
    .empty-text {
      font-size: 13px;
      opacity: 0.6;
      text-align: center;
      padding: 18px 10px;
    }
    .task-card {
      border-radius: 14px;
      padding: 12px 12px 10px 12px;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.4);
    }
    .task-title {
      font-size: 15px;
      font-weight: 500;
      color: #e5e7eb;
      margin-bottom: 6px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .task-planned {
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #020617;
      border: 1px solid rgba(148, 163, 184, 0.6);
    }
    .planned-today { border-color: #f97316; color: #fed7aa; }
    .planned-overdue { border-color: #dc2626; color: #fecaca; }
    .planned-future { border-color: #38bdf8; color: #bae6fd; }
    .task-meta { font-size: 11px; opacity: 0.65; }
    .task-meta span + span::before { content: "•"; margin: 0 4px; opacity: 0.5; }
    .task-actions { margin-top: 8px; display: flex; gap: 6px; }
    .task-btn {
      flex: 1;
      padding: 7px 8px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .task-btn-main { background: #4f46e5; color: #fff; }
    .task-btn-secondary {
      background: #020617;
      color: inherit;
      border: 1px solid rgba(148, 163, 184, 0.6);
    }
    .task-btn:disabled { opacity: 0.4; cursor: default; }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-title">Задачи</div>
      <div class="app-subtitle">Сначала записать, потом разбирать</div>
    </header>

    <section class="add-card">
      <div class="add-label">Новая задача</div>
      <textarea id="newTaskInput" class="add-textarea" rows="3" placeholder="Напишите, что нужно сделать..."></textarea>

      <div class="add-date-row">
        <div class="date-label">Плановая дата (необязательно)</div>
        <div class="date-quick-row">
          <button class="date-btn" data-days="0" id="btnToday">Сегодня</button>
          <button class="date-btn" data-days="1" id="btnTomorrow">Завтра</button>
          <button class="date-btn" data-adjust="-1" id="btnMinusDay">−1 день</button>
          <button class="date-btn" data-adjust="1" id="btnPlusDay">+1 день</button>
          <button class="date-btn primary" id="btnCalendar">📅</button>
          <input type="date" id="plannedDateInput" class="date-input" />
        </div>
        <div class="date-display" id="dateDisplay"></div>
      </div>

      <div class="add-footer">
        <button class="add-btn" id="addTaskBtn" disabled>➕ Добавить</button>
      </div>
    </section>

    <section class="tabs">
      <button class="tab-btn active" data-status="todo" id="tabTodo">
        📝 К выполнению <span class="count" id="countTodo">0</span>
      </button>
      <button class="tab-btn" data-status="in-progress" id="tabInProgress">
        🔄 В работе <span class="count" id="countInProgress">0</span>
      </button>
      <button class="tab-btn" data-status="done" id="tabDone">
        ✅ Готово <span class="count" id="countDone">0</span>
      </button>
    </section>

    <section class="task-list" id="taskList">
      <div class="empty-text">Задач пока нет. Напишите первую сверху.</div>
    </section>
  </div>

  <script>
    // ВСТАВЬ сюда URL веб-приложения Apps Script (Deploy URL) с параметром ?mode=tg-api
    // Пример: https://script.google.com/macros/s/XXX/exec?mode=tg-api
    const API_URL = 'https://script.google.com/macros/s/AKfycbwOmfbiY6qcoZtJJFyazXATEQKiVakQoFvRtVBwJbtGIFQUlhxFSiXlL89mI2_cxEg0/exec';

    let tg = null;
    let tasks = [];
    let activeStatus = 'todo';

    if (window.Telegram && window.Telegram.WebApp) {
      tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();
    }

    function haptic(type) {
      if (!tg || !tg.HapticFeedback) return;
      if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
      else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
      else tg.HapticFeedback.impactOccurred('light');
    }

    function getTodayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function getDateOffsetStr(baseStr, offsetDays) {
      let d;
      if (baseStr) {
        const [y, m, day] = baseStr.split('-').map(Number);
        d = new Date(y, m - 1, day, 12, 0, 0);
      } else {
        d = new Date();
      }
      d.setDate(d.getDate() + offsetDays);
      const y2 = d.getFullYear();
      const m2 = String(d.getMonth() + 1).padStart(2, '0');
      const d2 = String(d.getDate()).padStart(2, '0');
      return `${y2}-${m2}-${d2}`;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return '';
      const d = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
    }

    function formatDateWithDay(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split('-');
      if (parts.length !== 3) return '';
      const d = new Date(parts[0], parts[1] - 1, parts[2], 12, 0, 0);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('ru-RU', { weekday: 'short', day: 'numeric', month: 'long' });
    }

    function setSelectedDateText(value) {
      const el = document.getElementById('dateDisplay');
      if (!el) return;
      if (!value) {
        el.textContent = '';
        return;
      }
      el.innerHTML = 'Запланировано на <span>' + formatDateWithDay(value) + '</span>';
    }

    async function apiPost(payload) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...payload, _tgApiMode: true }),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'API error');
      return data.data;
    }

    async function loadTasks() {
      try {
        const data = await apiPost({ action: 'getTasks' });
        tasks = data || [];
        renderAll();
      } catch (e) {
        const list = document.getElementById('taskList');
        if (list) list.innerHTML = '<div class="empty-text">Ошибка загрузки: ' + e.message + '</div>';
      }
    }

    function initAddSection() {
      const input = document.getElementById('newTaskInput');
      const btnAdd = document.getElementById('addTaskBtn');
      const btnToday = document.getElementById('btnToday');
      const btnTomorrow = document.getElementById('btnTomorrow');
      const btnMinusDay = document.getElementById('btnMinusDay');
      const btnPlusDay = document.getElementById('btnPlusDay');
      const btnCalendar = document.getElementById('btnCalendar');
      const dateInput = document.getElementById('plannedDateInput');

      input.addEventListener('input', () => {
        const hasText = input.value.trim().length > 0;
        btnAdd.disabled = !hasText;
      });

      function setActiveQuick(button) {
        [btnToday, btnTomorrow].forEach(b => b.classList.remove('active'));
        if (button) button.classList.add('active');
      }

      btnToday.addEventListener('click', () => {
        const v = getTodayStr();
        dateInput.value = v;
        setSelectedDateText(v);
        setActiveQuick(btnToday);
        haptic('light');
      });

      btnTomorrow.addEventListener('click', () => {
        const v = getDateOffsetStr(getTodayStr(), 1);
        dateInput.value = v;
        setSelectedDateText(v);
        setActiveQuick(btnTomorrow);
        haptic('light');
      });

      btnMinusDay.addEventListener('click', () => {
        const base = dateInput.value || getTodayStr();
        const v = getDateOffsetStr(base, -1);
        dateInput.value = v;
        setSelectedDateText(v);
        setActiveQuick(null);
        haptic('light');
      });

      btnPlusDay.addEventListener('click', () => {
        const base = dateInput.value || getTodayStr();
        const v = getDateOffsetStr(base, 1);
        dateInput.value = v;
        setSelectedDateText(v);
        setActiveQuick(null);
        haptic('light');
      });

      btnCalendar.addEventListener('click', () => {
        dateInput.min = getTodayStr();
        if (typeof dateInput.showPicker === 'function') {
          dateInput.showPicker();
        } else {
          dateInput.click();
        }
      });

      dateInput.addEventListener('change', () => {
        const v = dateInput.value;
        setSelectedDateText(v);
        setActiveQuick(null);
      });

      btnAdd.addEventListener('click', async () => {
        const title = input.value.trim();
        if (!title) return;
        const planned = dateInput.value || '';
        btnAdd.disabled = true;
        haptic('success');
        try {
          const data = await apiPost({ action: 'addTask', title, plannedDate: planned });
          tasks = data || [];
          renderAll();
          input.value = '';
          dateInput.value = '';
          setSelectedDateText('');
        } catch (e) {
          alert('Ошибка: ' + e.message);
          haptic('error');
        } finally {
          btnAdd.disabled = false;
        }
      });
    }

    function initTabs() {
      const tabs = document.querySelectorAll('.tab-btn');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          const status = tab.dataset.status;
          if (!status) return;
          activeStatus = status;
          document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderTaskList();
          haptic('light');
        });
      });
    }

    function updateTabCounts() {
      const todo = tasks.filter(t => t.status === 'todo').length;
      const inProgress = tasks.filter(t => t.status === 'in-progress').length;
      const done = tasks.filter(t => t.status === 'done').length;
      document.getElementById('countTodo').textContent = todo;
      document.getElementById('countInProgress').textContent = inProgress;
      document.getElementById('countDone').textContent = done;
    }

    function renderAll() {
      updateTabCounts();
      renderTaskList();
    }

    function renderTaskList() {
      const list = document.getElementById('taskList');
      if (!list) return;

      const today = getTodayStr();
      const items = tasks.filter(t => t.status === activeStatus);

      items.sort((a, b) => {
        const ap = a.plannedDate || '';
        const bp = b.plannedDate || '';
        if (ap && bp && ap !== bp) return ap.localeCompare(bp);
        const as = a.startDate || '';
        const bs = b.startDate || '';
        return (bs || '').localeCompare(as || '');
      });

      list.innerHTML = '';

      if (items.length === 0) {
        const div = document.createElement('div');
        div.className = 'empty-text';
        div.textContent = activeStatus === 'todo'
          ? 'Новых задач нет. Добавьте сверху.'
          : 'Задач в этом разделе пока нет.';
        list.appendChild(div);
        return;
      }

      items.forEach(task => {
        const card = document.createElement('div');
        card.className = 'task-card';

        const titleEl = document.createElement('div');
        titleEl.className = 'task-title';
        titleEl.textContent = task.title || '';
        card.appendChild(titleEl);

        if (task.plannedDate) {
          const pill = document.createElement('div');
          pill.className = 'task-planned';
          const planned = task.plannedDate;
          if (planned < today) pill.classList.add('planned-overdue');
          else if (planned === today) pill.classList.add('planned-today');
          else pill.classList.add('planned-future');
          pill.textContent = planned === today ? 'Сегодня' : formatDateWithDay(planned);
          card.appendChild(pill);
        }

        const meta = document.createElement('div');
        meta.className = 'task-meta';
        const metaParts = [];
        if (task.startDate) metaParts.push('с ' + formatDate(task.startDate));
        if (task.duration) metaParts.push(task.duration);
        meta.innerHTML = metaParts.map(t => '<span>' + t + '</span>').join('');
        card.appendChild(meta);

        const actions = document.createElement('div');
        actions.className = 'task-actions';

        if (activeStatus === 'todo') {
          const main = document.createElement('button');
          main.className = 'task-btn task-btn-main';
          main.textContent = 'В работу';
          main.onclick = () => changeStatus(task.id, 'in-progress');
          actions.appendChild(main);
        } else if (activeStatus === 'in-progress') {
          const back = document.createElement('button');
          back.className = 'task-btn task-btn-secondary';
          back.textContent = 'Назад';
          back.onclick = () => changeStatus(task.id, 'todo');
          actions.appendChild(back);

          const main = document.createElement('button');
          main.className = 'task-btn task-btn-main';
          main.textContent = 'Готово';
          main.onclick = () => changeStatus(task.id, 'done');
          actions.appendChild(main);
        } else if (activeStatus === 'done') {
          const back = document.createElement('button');
          back.className = 'task-btn task-btn-secondary';
          back.textContent = 'Вернуть в работу';
          back.onclick = () => changeStatus(task.id, 'in-progress');
          actions.appendChild(back);
        }

        card.appendChild(actions);
        list.appendChild(card);
      });
    }

    async function changeStatus(taskId, newStatus) {
      if (!taskId || !newStatus) return;
      haptic('light');
      try {
        const data = await apiPost({ action: 'updateStatus', id: taskId, status: newStatus });
        tasks = data || [];
        renderAll();
      } catch (e) {
        alert('Ошибка: ' + e.message);
        haptic('error');
      }
    }

    function init() {
      initAddSection();
      initTabs();
      loadTasks();
      setSelectedDateText('');
    }

    init();
  </script>
</body>
</html>
