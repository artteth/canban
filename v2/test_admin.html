<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🧪 Тест админки</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    h1 { color: white; margin-bottom: 20px; }
    h2 { color: #333; margin-bottom: 16px; }
    pre {
      background: #f5f7fa;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      max-height: 400px;
      overflow-y: auto;
    }
    .btn {
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-danger {
      background: #f44336;
      color: white;
    }
  </style>
</head>
<body>
  <h1>🧪 Тест админки - Проверка данных</h1>
  
  <div class="container">
    <div class="card">
      <h2>🔍 Проверка localStorage</h2>
      <button class="btn btn-primary" onclick="checkData()">Проверить данные</button>
      <button class="btn btn-primary" onclick="createTestData()">Создать тестовые данные</button>
      <button class="btn btn-danger" onclick="clearData()">Очистить данные</button>
      <button class="btn btn-primary" onclick="location.href='admin_local.html'">Открыть админку</button>
      
      <h3 style="margin-top: 20px;">Результат:</h3>
      <pre id="result">Нажмите "Проверить данные"</pre>
    </div>
  </div>

  <script>
    const USERS_KEY = 'kanban_v2_users_local';
    const TASKS_KEY = 'kanban_v2_tasks_local';

    const DEFAULT_USERS = [
      { userId: 'user_1', name: 'Артём', telegramId: '@artem', role: 'admin' },
      { userId: 'user_2', name: 'Игорь', telegramId: '@igor', role: 'user' },
      { userId: 'user_3', name: 'Мария', telegramId: '@maria', role: 'user' }
    ];

    const DEFAULT_TASKS = [
      {
        id: 'task_1',
        title: 'Купить молоко и хлеб',
        status: 'todo',
        startDate: getTodayStr(),
        endDate: '',
        duration: '',
        plannedDate: getTodayStr(),
        assignedTo: 'user_2'
      },
      {
        id: 'task_2',
        title: 'Подготовить отчёт за квартал',
        status: 'in-progress',
        startDate: getDateOffsetStr(-2),
        endDate: '',
        duration: '',
        plannedDate: getDateOffsetStr(2),
        assignedTo: 'user_3'
      },
      {
        id: 'task_3',
        title: 'Позвонить клиенту Иванову',
        status: 'todo',
        startDate: getTodayStr(),
        endDate: '',
        duration: '',
        plannedDate: getTodayStr(),
        assignedTo: 'user_2'
      },
      {
        id: 'task_4',
        title: 'Исправить баги в модуле авторизации',
        status: 'done',
        startDate: getDateOffsetStr(-5),
        endDate: getDateOffsetStr(-2),
        duration: '3 дн.',
        plannedDate: getDateOffsetStr(-3),
        assignedTo: 'user_1'
      }
    ];

    function getTodayStr() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getDateOffsetStr(daysOffset) {
      const date = new Date();
      date.setDate(date.getDate() + daysOffset);
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function checkData() {
      const users = JSON.parse(localStorage.getItem(USERS_KEY)) || [];
      const tasks = JSON.parse(localStorage.getItem(TASKS_KEY)) || [];

      let output = `📊 Пользователей: ${users.length}\n`;
      output += `📋 Задач: ${tasks.length}\n\n`;

      if (users.length > 0) {
        output += '👥 Пользователи:\n';
        users.forEach(u => {
          output += `  - ${u.name} (${u.role}) [${u.userId}]\n`;
        });
        output += '\n';
      }

      if (tasks.length > 0) {
        output += '📋 Задачи:\n';
        tasks.forEach(t => {
          output += `  - ${t.title} [${t.status}] → ${t.assignedTo}\n`;
        });
      }

      if (users.length === 0 && tasks.length === 0) {
        output += '\n⚠️ Данные не найдены! Нажмите "Создать тестовые данные"';
      }

      document.getElementById('result').textContent = output;
    }

    function createTestData() {
      localStorage.setItem(USERS_KEY, JSON.stringify(DEFAULT_USERS));
      localStorage.setItem(TASKS_KEY, JSON.stringify(DEFAULT_TASKS));
      document.getElementById('result').textContent = '✅ Тестовые данные созданы!\n\nНажмите "Проверить данные" для проверки.';
    }

    function clearData() {
      if (!confirm('Вы уверены? Это удалит все данные!')) return;
      localStorage.removeItem(USERS_KEY);
      localStorage.removeItem(TASKS_KEY);
      document.getElementById('result').textContent = '🗑️ Данные очищены!';
    }

    // Проверка при загрузке
    checkData();
  </script>
</body>
</html>
